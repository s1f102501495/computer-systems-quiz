<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">

  <title>授業範囲 練習クイズ</title>
  <style>
    :root { --ink:#172033; --blue:#276ef1; --pale:#eff5ff; --ok:#087f5b; --ng:#c92a2a; }
    * { box-sizing:border-box; } body { margin:0; background:#f5f7fb; color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif; }
    main { max-width:900px; margin:0 auto; padding:28px 18px 56px; }
    h1 { font-size:clamp(1.55rem,4vw,2.2rem); margin:.25rem 0 .45rem; } .lead { color:#586174; margin:0 0 22px; }
    .panel,.question { background:#fff; border:1px solid #e1e6ef; border-radius:16px; box-shadow:0 4px 18px #1720330d; }
    .panel { padding:20px; margin:16px 0; } .setup { display:flex; gap:12px; align-items:end; flex-wrap:wrap; }
    label { display:grid; gap:6px; font-weight:650; } select,button { font:inherit; } select { padding:9px 12px; border:1px solid #cbd4e2; border-radius:9px; background:#fff; }
    button { border:0; border-radius:9px; background:var(--blue); color:#fff; font-weight:700; padding:11px 17px; cursor:pointer; } button:hover { filter:brightness(.94); }
    #quiz { display:grid; gap:14px; } .question { padding:20px; } .meta { color:#61708a; font-size:.88rem; font-weight:700; }
    h2 { font-size:1.12rem; line-height:1.6; margin:7px 0 13px; } .options { display:grid; gap:8px; }
    .option { display:flex; gap:10px; align-items:flex-start; padding:11px 12px; border:1px solid #dce3ef; border-radius:10px; cursor:pointer; }
    .option:hover { background:#f7faff; } input { margin-top:3px; accent-color:var(--blue); }
    .review-toggle { margin:2px 0 12px; padding:7px 11px; color:#42516a; background:#eef2f8; border:1px solid #cbd4e2; }
    .review-toggle.active { color:#8a4b00; background:#fff2d9; border-color:#e9b65f; }
    .review-hidden { display:none; }
    .actions { margin:22px 0; display:flex; gap:12px; flex-wrap:wrap; } .secondary { background:#63708a; }
    #result { display:none; } .score { font-size:1.45rem; font-weight:800; color:var(--blue); } .answer { margin-top:12px; padding:12px; border-radius:9px; background:#f7f9fd; line-height:1.55; }
    .correct { border-left:4px solid var(--ok); } .wrong { border-left:4px solid var(--ng); } .tag { display:inline-block; font-size:.78rem; background:var(--pale); color:#2058bd; padding:3px 7px; border-radius:99px; font-weight:700; }
    .hidden { display:none; } .progress { font-weight:700; color:#52617a; }
  </style>
</head>
<body>
<main>
  <h1>授業範囲 練習クイズ</h1>
  <p class="lead">ネットワークからSQL、データ分析、UX、画像処理、ログ分析、暗号・ブロックチェーン、スマートファクトリーまで。毎回問題と選択肢の順番が変わります。</p>
  <section class="panel setup">
    <label>出題数<select id="count"><option value="10">10問</option><option value="20" selected>20問</option><option value="30">30問</option><option value="50">50問</option></select></label>
    <label>分野<select id="topic"><option value="all">すべて</option></select></label>
    <button id="start">クイズを始める</button>
  </section>
  <p id="progress" class="progress hidden"></p>
  <form id="quiz"></form>
  <div class="actions hidden" id="actions"><button id="grade" type="button">採点して解説を見る</button><button id="retry" type="button" class="secondary">別の問題でやり直す</button></div>

</main>

const topic=document.querySelector('#topic'), count=document.querySelector('#count'), quiz=document.querySelector('#quiz'), result=document.querySelector('#result'), actions=document.querySelector('#actions'), progress=document.querySelector('#progress');
const topics=[...new Set(Q.map(q=>q[0]))]; topics.forEach(x=>topic.add(new Option(x,x)));
let current=[];
const shuffle=a=>[...a].sort(()=>Math.random()-.5);
function start(){ const pool=topic.value==='all'?Q:Q.filter(q=>q[0]===topic.value); current=shuffle(pool).slice(0,Math.min(+count.value,pool.length)); quiz.innerHTML=current.map((q,i)=>{ const opts=shuffle(q[2].map((t,n)=>({t,n}))); return `<section class="question" data-i="${i}"><span class="tag">${q[0]}</span><h2>問${i+1}　${q[1]}</h2><button type="button" class="review-toggle" aria-pressed="false">見直す</button><div class="options">${opts.map(o=>`<label class="option"><input required type="radio" name="q${i}" value="${o.n}"><span>${o.t}</span></label>`).join('')}</div></section>`}).join(''); quiz.querySelectorAll('.review-toggle').forEach(btn=>btn.onclick=()=>{const on=btn.classList.toggle('active'); btn.setAttribute('aria-pressed',on); btn.textContent=on?'見直しに登録済み':'見直す';}); result.style.display='none'; actions.classList.remove('hidden'); progress.classList.remove('hidden'); progress.textContent=`${current.length}問を選びました。必要な問題は「見直す」を押してから採点しましょう。`; window.scrollTo({top:quiz.offsetTop-10,behavior:'smooth'}); }
function grade(){ let score=0, wrong={}, shown=0; current.forEach((q,i)=>{const box=quiz.querySelector(`[data-i="${i}"]`), picked=quiz.querySelector(`input[name="q${i}"]:checked`), ok=picked&&+picked.value===q[3], review=box.querySelector('.review-toggle').classList.contains('active'); if(ok)score++; else wrong[q[0]]=(wrong[q[0]]||0)+1; box.classList.add(ok?'correct':'wrong'); box.querySelector('.answer')?.remove(); const chosen=picked?q[2][+picked.value]:'未回答'; box.insertAdjacentHTML('beforeend',`<div class="answer"><b>${ok?'正解！':'不正解'}</b><br>あなたの答え：${chosen}<br>正解：${q[2][q[3]]}<br>${q[4]}</div>`); if(ok&&!review) box.classList.add('review-hidden'); else shown++; }); const weak=Object.entries(wrong).sort((a,b)=>b[1]-a[1]).map(x=>x[0]).join('・'); result.style.display='block'; result.innerHTML=`<div class="score">${score} / ${current.length} 問 正解</div><p>${score===current.length?'満点です！ この調子で、選択肢の理由まで説明できるようにしておくと安心です。':`復習ポイント：${weak||'なし'}。解説を読んで、間違えた理由を確認しましょう。`}<br>見直し対象として ${shown} 問を表示しています。</p>`; progress.textContent='採点済みです。不正解と「見直す」を押した問題だけを表示しています。'; result.scrollIntoView({behavior:'smooth',block:'center'}); }
document.querySelector('#start').onclick=start; document.querySelector('#retry').onclick=start; document.querySelector('#grade').onclick=grade;
